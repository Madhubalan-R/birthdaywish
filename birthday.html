<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Wish Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .card-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 500px;
            width: 100%;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 40px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: fall 3s linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(100px) rotate(360deg);
                opacity: 0;
            }
        }

        .confetti:nth-child(1) { left: 10%; animation-delay: 0s; }
        .confetti:nth-child(2) { left: 20%; animation-delay: 0.5s; }
        .confetti:nth-child(3) { left: 30%; animation-delay: 1s; }
        .confetti:nth-child(4) { left: 40%; animation-delay: 0.3s; }
        .confetti:nth-child(5) { left: 50%; animation-delay: 0.8s; }
        .confetti:nth-child(6) { left: 60%; animation-delay: 0.2s; }
        .confetti:nth-child(7) { left: 70%; animation-delay: 1.2s; }
        .confetti:nth-child(8) { left: 80%; animation-delay: 0.6s; }
        .confetti:nth-child(9) { left: 90%; animation-delay: 0.9s; }

        h1, p {
            color: white;
            font-size: 3em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
            animation: bounce 0.6s ease-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .card-image {
            text-align: center;
            padding: 30px 20px;
        }

        .card-image img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            animation: zoomIn 0.6s ease-out;
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .card-content {
            padding: 30px 20px;
            text-align: center;
        }

        .card-content p {
            color: #666;
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 15px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .wish-message {
            font-size: 1.3em;
            font-weight: bold;
            color: #764ba2;
            margin: 20px 0;
            font-style: italic;
        }

        .card-footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            border-top: 2px solid #667eea;
        }

        .stars {
            font-size: 2em;
            letter-spacing: 10px;
            color: #f5576c;
            margin-bottom: 10px;
        }

        .signature {
            color: #999;
            font-size: 0.9em;
            font-style: italic;
        }

        /* Responsive design */
        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }
            
            .card-content p {
                font-size: 1em;
            }

            .wish-message {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="card-header">
            <div class="confetti"></div>
            <div class="confetti"></div>
            <div class="confetti"></div>
            <div class="confetti"></div>
            <div class="confetti"></div>
            <div class="confetti"></div>
            <div class="confetti"></div>
            <div class="confetti"></div>
            <div class="confetti"></div>
            <h1>🎉 Happy Birthday! 🎂</h1>
            <p>Manivasagam M</p>
        </div>

        <div class="card-image">
            <img src="image.png" alt="Birthday greeting">
        </div>

        <div class="card-content">
            <p>Wishing you a day filled with joy, laughter, and wonderful moments!</p>
            <div class="wish-message">
                May all your dreams come true and may this year bring you happiness and success!
            </div>
            <p>Have the most amazing birthday ever! 🌟</p>
        </div>

        <div class="card-footer">
            <div class="stars">✨ ✨ ✨</div>
            <p class="signature">With love and warmest wishes</p>
        </div>
    </div>
</body>
</html>
